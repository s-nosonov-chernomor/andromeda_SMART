debug:
  enabled: true
  log_reads: true
  summary_every_s: 20
mqtt:
  host: 127.0.0.1
  port: 1883
  base_topic: /devices
  qos: 0
  retain: false
  client_id: uspd-modbus-gw
db:
  url: sqlite:///./data/data.db
alerts:
  http_timeout_s: 10
  insecure_tls: false
history:
  max_rows: 50
  ttl_days: 15
  cleanup_every: 500
backups:
  dir: ./data/backups
  keep: 10
serial:
  echo: false
addressing:
  normalize: false
service:
  unit: agent.service
  restart_cmd: ''
andromeda:
  restart_cmd: /usr/local/bin/restart-andromeda.sh
current:
  touch_read_every_s: 3
polling:
  interval_ms: 500
  jitter_ms: 60
  backoff_ms: 200
  max_errors_before_backoff: 3
  port_retry_backoff_s: 5
  inter_request_delay_ms: 10
  crc_retry_count: 1
  crc_retry_delay_ms: 30
  write_coalesce_ms: 80
  write_max_tasks: 300
  write_max_bits: 32
  write_max_registers: 20
  unit_error_skip_s: 2
  skip_node_on_timeout: true
  batch_read:
    enabled: true
    max_bits: 32
    max_registers: 20
  fast_modbus:
    enabled: true
    interval_ms: 50
    jitter_ms: 0
    max_events_per_poll: 100
    bootstrap_pause_ms: 20
    rx_gap_ms: 20
    rx_hard_timeout_ms: 350
    poll_idle_sleep_ms: 100
    poll_pending_sleep_ms: 200
    protocol_debug: true
    test_enabled: false
lines:
- name: line2
  transport: serial
  device: //dev/ttyUSB2
  baudrate: 115200
  timeout: 0.1
  parity: N
  stopbits: 1
  port_retry_backoff_s: 5
  rs485_rts_toggle: false
  nodes:
  - unit_id: 56
    params:
    - name: Напряжение, В
      register_type: input
      address: 4313
      words: 1
      data_type: u16
      word_order: AB
      scale: 0.01
      mode: r
      publish_mode: interval
      publish_interval_s: 3600.0
      topic: null
    - name: Частота, Гц
      register_type: input
      address: 4344
      words: 1
      data_type: u16
      word_order: AB
      scale: 0.01
      mode: r
      publish_mode: interval
      publish_interval_s: 3600.0
      topic: null
    - name: Ток (канал 2), А
      register_type: input
      address: 5144
      words: 1
      data_type: u16
      word_order: AB
      scale: 0.016
      mode: r
      publish_mode: interval
      publish_interval_s: 3600.0
      topic: null
    - name: u64 Прямая активная энергия для канала 1, кВт*ч
      register_type: input
      address: 6668
      words: 4
      data_type: u64
      word_order: ABCD
      scale: 1.0e-05
      mode: r
      publish_mode: interval
      publish_interval_s: 3600.0
      topic: null
    - name: Активная мощность для канала 1, Вт
      register_type: input
      address: 4870
      words: 2
      data_type: s32
      word_order: AB
      scale: 0.000244141
      mode: r
      publish_mode: interval
      publish_interval_s: 3600.0
      topic: null
    - name: Активная мощность для канала 2, Вт
