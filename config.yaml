debug:
  enabled: true
  log_reads: true
  summary_every_s: 20
mqtt:
  host: 127.0.0.1
  port: 1883
  base_topic: /devices
  qos: 0
  retain: false
  client_id: uspd-modbus-gw
db:
  url: sqlite:///./data/data.db
alerts:
  insecure_tls: false
  http_timeout_s: 10
history:
  max_rows: 50
  ttl_days: 15
  cleanup_every: 500
backups:
  dir: ./data/backups
  keep: 10
serial:
  echo: false
addressing:
  normalize: false
service:
  unit: agent.service
  restart_cmd: ''
andromeda:
  restart_cmd: /usr/local/bin/restart-andromeda.sh
current:
  touch_read_every_s: 3
polling:
  interval_ms: 500
  jitter_ms: 60
  backoff_ms: 200
  max_errors_before_backoff: 3
  port_retry_backoff_s: 5
  inter_request_delay_ms: 10
  crc_retry_count: 1
  crc_retry_delay_ms: 30
  write_coalesce_ms: 80
  write_max_tasks: 300
  write_max_bits: 32
  write_max_registers: 20
  batch_read:
    enabled: true
    max_bits: 32
    max_registers: 20
  fast_modbus:
    enabled: true
    interval_ms: 50
    jitter_ms: 0
    max_events_per_poll: 100
    bootstrap_pause_ms: 20
    rx_gap_ms: 20
    rx_hard_timeout_ms: 350
    poll_idle_sleep_ms: 10
    poll_pending_sleep_ms: 200
    protocol_debug: true
    test_enabled: false
